<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="3; URL='https://gofund.me/031e01e51'" />
  <meta name="viewport" content="width=device-width, initial-scale=.5" />
  <title>Urgent humanitarian appeal</title>
  <meta property="og:title" content="Urgent humanitarian appeal to save a family who lost everything" />
  <meta property="og:description" content="Thank you for your humanity and care" />
  <meta property="og:image" content="https://i.ibb.co/6cFthCry/xw-LMy-Li-Tg-GMq-Tfw7-K8-Xg.jpg" />
  <meta property="og:url" content="https://gofund.me/031e01e51" />
  <meta name="twitter:card" content="summary_large_image" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a1a;
      padding: 10px;
      font-family: Arial, sans-serif;
    }
    .flag-wrapper {
      width: 120px;
      height: 60px;
      animation: wave 1.5s ease-in-out infinite;
      transform-origin: top center;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .flag-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    @keyframes wave {
      0%, 100% { transform: perspective(150px) rotateY(-3deg); }
      50% { transform: perspective(150px) rotateY(3deg); }
    }
    .text-container {
      margin: 15px 10px;
      text-align: center;
      color: #fff;
      max-width: 400px;
    }
    .text-container h2 {
      font-size: 18px;
      margin-bottom: 10px;
      color: #ff6b6b;
    }
    .text-container p {
      font-size: 14px;
      line-height: 1.6;
      color: #e0e0e0;
    }
    .image-container {
      margin-top: 15px;
      max-width: 400px;
      width: 100%;
    }
    .image-container img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>
  <div class="flag-wrapper">
    <img src="https://flagcdn.com/w320/ps.png" alt="Palestine Flag" class="flag-img" />
  </div>
  
  <div class="text-container">
    <h2>🕊️ They Lost Everything</h2>
    <p>Three innocent children stand amid the ruins of their home. Their father is trapped, and they have no one. Every second counts. Your help can save them from starvation and despair. Please, don't turn away. ❤️🇵🇸</p>
  </div>
  
  <div class="image-container">
    <img src="https://i.ibb.co/rfmrmySP/IMG-20260203-003100-763.jpg" alt="Humanitarian Appeal" />
  </div>

  <script>
    setTimeout(function() {
      window.location.replace("https://gofund.me/031e01e51");
    }, 3000);
  </script>
</body>
</html>
